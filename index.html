<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>frontend-project-11</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <h1 class="title display-4 my-4">RSS агрегатор</h1>
                <h3 class="subtitle display-4 my-4">Начните читать RSS сегодня! Это легко, это красиво.</h3>
                
                <form class="mb-4" novalidate>
                      <label for="rss-input" class="form-label visually-hidden">Ссылка RSS</label>                    
                      <div class="input-group">
                      <input 
                        autocomplete="off"
                        type="url"
                        class="form-control"
                        id="rss-input"
                        placeholder="Ссылка RSS"
                        aria-label="url"
                        required
                      >
                        <button class="btn btn-primary" type="submit">Добавить</button>
                    </div>
                </form>
                
                <p class="example">Пример: https://lorem-rss.hexlet.app/feed</p>
            </div>
        </div>
    </div>
    <div class="container mt-4">
      <div class="row">
        <div class="col-md-6">
          <h2 class="mb-3 text-dark">Посты</h2>
          <div class="posts-container posts"></div>
        </div>
        <div class="col-md-6">
          <h2 class="mb-3 text-dark">Фиды</h2>
          <div class="feeds-container feeds"></div>
        </div>
      </div>
    </div>
    
    
    <script type="module" src="./src/main.js"></script>
</body>
</html>
